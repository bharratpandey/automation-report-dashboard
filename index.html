<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Automation Dashboard — EMB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* Header */
  .header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; background: #1a4a8a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11.5px; color: #9a9aaa; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .last-upd { font-size: 11.5px; color: #9a9aaa; }
  .refresh-btn { padding: 6px 14px; border: 1px solid #dde1e7; background: #fff; border-radius: 7px; font-size: 12.5px; cursor: pointer; color: #555; font-family: inherit; display: flex; align-items: center; gap: 5px; }
  .refresh-btn:hover { background: #f5f7fa; }

  /* Page */
  .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  /* Date card */
  .date-card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .date-left { display: flex; align-items: center; gap: 12px; }
  .date-label { font-size: 13px; font-weight: 700; color: #5a6a7a; letter-spacing: .05em; text-transform: uppercase; }
  .date-input { padding: 7px 12px; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a2e; background: #fff; cursor: pointer; outline: none; }
  .date-input:focus { border-color: #1a4a8a; }
  .date-right { font-size: 13px; color: #9a9aaa; }

  /* Tabs */
  .tabs-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 18px; border-radius: 8px; border: 1px solid #dde1e7; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; color: #667; font-family: inherit; transition: all .12s; }
  .tab:hover { background: #f0f2f5; }
  .tab.active { background: #1a4a8a; color: #fff; border-color: #1a4a8a; }
  .result-count { font-size: 13px; color: #9a9aaa; }

  /* Table */
  .table-card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f5f7fa; border-bottom: 1.5px solid #e8eaed; }
  thead th { padding: 13px 20px; font-size: 11.5px; font-weight: 700; color: #7a8a9a; text-transform: uppercase; letter-spacing: .07em; text-align: left; }
  tbody tr { border-bottom: 1px solid #f0f2f5; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fc; }
  tbody tr.active-row { background: #eef3fb; }
  tbody td { padding: 16px 20px; font-size: 13.5px; vertical-align: middle; }
  .td-time { color: #5a6a8a; font-weight: 500; width: 120px; }
  .td-name { font-weight: 600; }
  .td-proj { width: 110px; }
  .td-status { width: 130px; }
  .td-env { color: #5a6a7a; width: 130px; }
  .td-actions { width: 220px; text-align: right; }
  .proj-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .proj-tag.emb { background: #e8f0fb; color: #1d4f93; }
  .proj-tag.artha { background: #f0eefd; color: #3f3691; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; padding: 4px 12px; border-radius: 8px; font-weight: 600; }
  .status-badge.pass { background: #e6f4ed; color: #0a7a45; }
  .status-badge.fail { background: #fce9e9; color: #b52020; }
  .status-badge.partial { background: #fdf0d8; color: #8a5010; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .act-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 7px; border: 1.5px solid #dde1e7; font-size: 12.5px; font-weight: 500; cursor: pointer; font-family: inherit; background: #fff; color: #445; text-decoration: none; transition: all .12s; }
  .act-btn:hover { border-color: #1a4a8a; color: #1a4a8a; background: #eef3fb; }
  .act-btn.active { background: #1a4a8a; color: #fff; border-color: #1a4a8a; }
  .act-btn.dl { color: #1d4f93; border-color: #b8c8e8; background: #eef3fb; }
  .act-btn.dl:hover { background: #dce8f8; }
  .act-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
  .state-row td { text-align: center; padding: 48px 20px; color: #9a9aaa; font-size: 13.5px; }
  .skel { height: 18px; border-radius: 6px; background: linear-gradient(90deg,#eee 0%,#f5f5f5 50%,#eee 100%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,40,.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }

  /* Modal — wide two-panel */
  .modal {
    background: #fff; border-radius: 16px;
    width: 100%; max-width: 1100px; height: 88vh;
    display: grid; grid-template-rows: auto 1fr auto;
    box-shadow: 0 24px 64px rgba(0,0,0,.25);
    overflow: hidden; animation: modalIn .18s ease-out;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }

  .modal-header { padding: 16px 22px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: flex-start; justify-content: space-between; }
  .modal-subject { font-size: 11.5px; color: #9a9aaa; font-weight: 500; margin-bottom: 3px; }
  .modal-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .modal-close { width: 30px; height: 30px; border-radius: 7px; border: 1px solid #e8eaed; background: #fff; font-size: 16px; cursor: pointer; color: #777; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 12px; }
  .modal-close:hover { background: #f5f7fa; }

  /* Two-panel body */
  .modal-panels { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

  /* Left — summary */
  .modal-summary { border-right: 1px solid #f0f2f5; overflow-y: auto; padding: 18px; background: #fff; }
  .modal-summary::-webkit-scrollbar { width: 4px; }
  .modal-summary::-webkit-scrollbar-thumb { background: #dde; border-radius: 3px; }

  /* Right — report viewer */
  .modal-viewer { display: flex; flex-direction: column; overflow: hidden; background: #f5f7fa; }
  .modal-viewer-bar { padding: 9px 14px; border-bottom: 1px solid #e8eaed; background: #fff; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-viewer-label { font-size: 12px; font-weight: 600; color: #5a6a7a; display: flex; align-items: center; gap: 6px; }
  .modal-viewer-actions { display: flex; gap: 6px; }
  .mv-btn { padding: 4px 11px; border-radius: 6px; border: 1px solid #dde1e7; background: #fff; font-size: 12px; cursor: pointer; color: #445; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all .12s; }
  .mv-btn:hover { background: #eef3fb; color: #1a4a8a; border-color: #1a4a8a; }
  .modal-viewer-body { flex: 1; overflow: hidden; }
  .report-iframe { width: 100%; height: 100%; border: none; display: block; }
  .no-report-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9a9aaa; font-size: 13px; gap: 10px; text-align: center; padding: 20px; }
  .no-report-icon { font-size: 40px; opacity: .3; }

  /* Summary styles */
  .m-greeting { font-size: 13px; color: #444; margin-bottom: 10px; }
  .m-banner { font-size: 13.5px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
  .m-banner.pass { color: #0a7a45; }
  .m-banner.fail { color: #b52020; }
  .m-banner.partial { color: #8a5010; }
  .m-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: #e8eaed; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .m-stat { background: #f8f9fc; padding: 11px 6px; text-align: center; }
  .m-stat-num { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
  .m-stat-lbl { font-size: 9px; color: #9a9aaa; text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; font-weight: 600; }
  .m-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .m-table tr { border-bottom: 1px solid #f0f2f5; }
  .m-table tr:last-child { border-bottom: none; }
  .m-table th { padding: 8px 10px; font-size: 11.5px; font-weight: 600; color: #1a4a8a; width: 44%; text-align: left; background: #fafbfc; }
  .m-table td { padding: 8px 10px; font-size: 11.5px; color: #334; }
  .m-table a { color: #1a4a8a; font-weight: 500; }
  .m-table a:hover { text-decoration: underline; }
  .m-note { border-left: 3px solid #d97706; background: #fffbf0; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 12px; font-size: 11.5px; color: #555; line-height: 1.6; }
  .m-note strong { color: #92400e; }
  .m-footer-text { font-size: 11px; color: #9a9aaa; margin-bottom: 8px; line-height: 1.5; }
  .m-credits { font-size: 10px; color: #bbb; }

  /* Modal footer */
  .modal-footer { padding: 12px 18px; border-top: 1px solid #f0f2f5; display: flex; gap: 10px; background: #fafbfc; }
  .mf-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 10px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; transition: all .12s; border: none; }
  .mf-btn.trace { background: #1a4a8a; color: #fff; }
  .mf-btn.trace:hover { background: #153d74; }
  .mf-btn.trace.disabled { background: #c5cfe8; cursor: not-allowed; pointer-events: none; }
  .mf-btn.dl { background: #f0f2f5; color: #1a1a2e; border: 1.5px solid #dde1e7; }
  .mf-btn.dl:hover { background: #e8eaed; }
  .mf-btn.dl.disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

  /* Trace dropdown */
  .trace-dropdown { position: relative; flex: 1; }
  .trace-dropdown .mf-btn { width: 100%; }
  .trace-dd-menu {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 0;
    background: #fff; border: 1px solid #e8eaed; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12); min-width: 280px; overflow: hidden; z-index: 10;
  }
  .trace-dd-menu.open { display: block; }
  .trace-opt {
    display: flex; align-items: center; width: 100%; padding: 10px 14px;
    font-size: 12.5px; font-family: inherit; background: none; border: none;
    border-bottom: 1px solid #f0f2f5; cursor: pointer; color: #1a1a2e;
    text-align: left; transition: background .1s; gap: 6px;
  }
  .trace-opt:last-child { border-bottom: none; }
  .trace-opt:hover { background: #eef3fb; color: #1a4a8a; }

  /* ── Mobile responsive ── */
  @media (max-width: 768px) {
    .header { padding: 10px 16px; }
    .header-title { font-size: 13.5px; }
    .header-sub { display: none; }
    .last-upd { display: none; }

    .page { padding: 14px 12px; }

    .date-card { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px; }
    .date-right { font-size: 12px; }

    .tabs-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    .tabs { width: 100%; }
    .tab { flex: 1; text-align: center; padding: 6px 8px; font-size: 12px; }

    /* Table → card layout on mobile */
    .table-card { border-radius: 10px; overflow: hidden; }
    table { display: block; }
    thead { display: none; }
    tbody { display: block; }
    tbody tr {
      display: flex; flex-direction: column;
      padding: 14px 14px 10px;
      border-bottom: 1px solid #e8eaed;
      position: relative;
    }
    tbody tr.active-row { background: #eef3fb; }
    tbody td { display: block; padding: 0; border: none; font-size: 13px; }
    .td-time { color: #9a9aaa; font-size: 11.5px; margin-bottom: 4px; }
    .td-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .td-proj { margin-bottom: 4px; }
    .td-status { margin-bottom: 8px; }
    .td-env { font-size: 12px; color: #7a8a9a; margin-bottom: 10px; }
    .td-actions { text-align: left; }
    .actions { justify-content: flex-start; }
    .act-btn { font-size: 12px; padding: 5px 12px; }

    /* Modal full screen on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: 16px 16px 0 0;
      max-width: 100%; width: 100%;
      height: 92vh;
      grid-template-rows: auto auto 1fr auto;
    }
    .modal-panels {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      overflow-y: auto;
    }
    .modal-summary {
      border-right: none;
      border-bottom: 1px solid #f0f2f5;
      max-height: none;
      overflow-y: visible;
    }
    .modal-viewer { min-height: 340px; }
    .modal-viewer-bar { flex-wrap: wrap; gap: 6px; }
    .modal-footer { flex-direction: column; gap: 8px; }
    .mf-btn { font-size: 13px; padding: 12px; }
    .trace-dropdown { width: 100%; }
    .trace-dd-menu { width: 100%; min-width: unset; }

    /* Stats strip on mobile */
    .m-stats { grid-template-columns: 1fr 1fr 1fr; }
    .m-stat-num { font-size: 20px; }
    .m-stat-lbl { font-size: 8.5px; }
  }

  @media (max-width: 400px) {
    .date-input { font-size: 13px; }
    .modal { height: 96vh; }
  }
</style>

  function openTrace(encodedUrl, name) {
    const url = decodeURIComponent(encodedUrl);
    // If it's a real zip URL, open in trace viewer; if demo just open trace.playwright.dev
    const viewerUrl = url.startsWith('http') && url.includes('.zip')
      ? `https://trace.playwright.dev/?trace=${encodedUrl}`
      : 'https://trace.playwright.dev';
    window.open(viewerUrl, '_blank');
    document.getElementById('trace-dd-menu').classList.remove('open');
  }

  // ── Download report (works for both real URL and embedded HTML) ──
  function downloadReport(id) {
    const r = allReports.find(x => x.id === id);
    if (!r) return;
    if (r.report_url) {
      // Real file — trigger anchor download
      const a = document.createElement('a');
      a.href = r.report_url; a.download = rName(r) + '.html';
      a.click();
    } else if (r.report_html) {
      // Embedded HTML — create blob and download
      downloadHtml(r.report_html, rName(r));
    }
  }

  function downloadHtml(html, name) {
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name.replace(/\s+/g,'-') + '-report.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
</script>
</body>
